<div class="bet-panel">
  <div class="row no-growing">
    <mat-toolbar color="primary">
      <toolbar></toolbar>
    </mat-toolbar>
  </div>

  <div class="row no-growing">
    <bet-contest></bet-contest>
  </div>

  <div class="row no-growing">
    <bet-duration
      *ngIf="(contest$ | async) && (category$ | async)"
    ></bet-duration>
  </div>

  <div *ngIf="!displayBetterPoints; else displayPoints" class="row growing">
    <bet-player *ngIf="(contest$ | async) && (category$ | async)"></bet-player>
  </div>

  <ng-template #displayPoints>
    <div class="row growing">
      <bet-point></bet-point>
    </div>
    <div class="row footer">
      <button
        mat-flat-button
        color="primary"
        (click)="closeBetterPoints()"
        cdkFocusInitial
      >
        Fermer
      </button>
    </div>
  </ng-template>
</div>
