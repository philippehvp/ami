<div class="bet-panel">
  <div class="row header">
    <mat-toolbar color="primary">
      <toolbar></toolbar>
    </mat-toolbar>
  </div>

  <div class="row header">
    <bet-contest></bet-contest>
  </div>

  <div class="row header">
    <bet-duration
      *ngIf="(contest$ | async) && (category$ | async)"
    ></bet-duration>
  </div>

  <div class="row player">
    <bet-player *ngIf="(contest$ | async) && (category$ | async)"></bet-player>
  </div>
</div>
