<ng-container
  *ngIf="{
    bets: bets$ | async,
    category: category$ | async,
    contests: contests$ | async
  } as data"
>
  <span *ngFor="let contest of data.contests" class="contest-panel">
    <span class="contest-label">{{ contest.shortName }}</span>
    <span
      *ngFor="let category of contest.categories"
      (click)="changeCategory(category.id)"
      [class]="
        getCategoryClass(data?.bets || [], category, data.category || null)
      "
    >
      {{ category.shortName }}
    </span>
  </span>
</ng-container>
