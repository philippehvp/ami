@if (data$ | async; as data) {
  <ng-container>
    <span class="contest-panel">
      @for (contest of data.contests; track contest) {
        <ng-container>
          @for (category of contest.categories; track category) {
            <ng-container>
              <span
                class="category link"
                (click)="changeCategory(category.id)"
                [class]="{
                  selected: isCurrentCategory(
                    category || null,
                    data.category || null
                  ),
                  complete: isCategoryComplete(
                    category || null,
                    data.bets || []
                  ),
                  uncomplete: !isCategoryComplete(
                    category || null,
                    data.bets || []
                  ),
                }"
              >
                <span class="contest-label">{{ contest.shortName }}</span>
                <span class="category-label">{{ category.shortName }}</span>
                <span
                  class="indicator"
                  [class]="{
                    unselected: !isCurrentCategory(
                      category || null,
                      data.category || null
                    ),
                    complete: isCategoryComplete(
                      category || null,
                      data.bets || []
                    ),
                  }"
                ></span>
              </span>
            </ng-container>
          }
        </ng-container>
      }
    </span>
  </ng-container>
}
