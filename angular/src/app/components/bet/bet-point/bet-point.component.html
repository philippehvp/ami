<titlebar title="Points pour la série"></titlebar>

<table
  mat-table
  [dataSource]="(betterPoints$ | async) || []"
  *ngIf="{ better: better$ | async } as data"
>
  <ng-container matColumnDef="better">
    <th mat-header-cell *matHeaderCellDef>Pronostiqueurs</th>
    <td mat-cell *matCellDef="let better">
      {{ better.name }} - {{ better.firstName }}
    </td>
  </ng-container>

  <ng-container matColumnDef="points">
    <th mat-header-cell *matHeaderCellDef>Points</th>
    <td mat-cell *matCellDef="let better">
      {{ better.points }}
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
