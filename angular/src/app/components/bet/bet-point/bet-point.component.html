<div *ngIf="{ currentBetter: better$ | async } as data">
  <table mat-table [dataSource]="(betterPoints$ | async) || []">
    <ng-container matColumnDef="better">
      <th mat-header-cell *matHeaderCellDef>Pronostiqueurs</th>
      <td mat-cell *matCellDef="let better">
        {{ better.name }} - {{ better.firstName }}
      </td>
    </ng-container>

    <ng-container matColumnDef="points">
      <th mat-header-cell *matHeaderCellDef>
        Points
        <span *ngIf="(better$ | async)?.isAdmin">
          <mat-icon (click)="closeBetterPoints(data.currentBetter || undefined)"
            >close</mat-icon
          >
        </span>
      </th>
      <td mat-cell *matCellDef="let better">
        {{ better.points }}
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
