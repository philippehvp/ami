<div class="duration-panel">
  <span class="duration-label"
    >Match le plus long : {{ (duration$ | async)?.duration }} minutes</span
  >

  <div class="duration">
    <mat-slider
      max="120"
      min="30"
      step="1"
      discrete="true"
      [disabled]="!(duration$ | async)?.isDurationUpdatable"
      class="duration-slider"
    >
      <input
        matSliderThumb
        (valueChange)="changeDuration($event)"
        [ngModel]="(duration$ | async)?.duration"
        class="duration-slider"
      />
    </mat-slider>
  </div>
</div>
