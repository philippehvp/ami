<div class="duration-container">
  <label>Durée match max. : {{ duration$ | async }} minutes</label>
  <mat-slider max="120" min="30" step="1" discrete="true">
    <input
      matSliderThumb
      (valueChange)="changeDuration($event)"
      [ngModel]="duration$ | async"
    />
  </mat-slider>
</div>
