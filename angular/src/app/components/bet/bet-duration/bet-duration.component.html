<div class="duration-container">
  <label>Durée match max. : {{ (duration$ | async)?.duration }} min</label>
  <mat-slider
    max="120"
    min="30"
    step="1"
    discrete="true"
    [disabled]="!(duration$ | async)?.isDurationUpdatable"
    class="duration"
  >
    <input
      matSliderThumb
      (valueChange)="changeDuration($event)"
      [ngModel]="(duration$ | async)?.duration"
    />
  </mat-slider>
</div>
