<div class="create-better">
  <div class="create-better-panel">
    <h3>Création d'un compte Winabad</h3>

    <form [formGroup]="formGroup">
      <p>
        <mat-form-field>
          <mat-label>Pseudo</mat-label>
          <input
            matInput
            type="text"
            formControlName="account"
            required
            autocomplete="on"
          />
        </mat-form-field>
      </p>

      <p>
        <mat-form-field>
          <mat-label>Mot de passe (2 car. min)</mat-label>
          <input
            matInput
            type="text"
            formControlName="password"
            required
            autocomplete="on"
            minlength="2"
          />
        </mat-form-field>
      </p>

      <p>
        <mat-form-field>
          <mat-label>Nom</mat-label>
          <input
            matInput
            type="text"
            formControlName="name"
            required
            autocomplete="on"
          />
        </mat-form-field>
      </p>

      <p>
        <mat-form-field>
          <mat-label>Prénom</mat-label>
          <input
            matInput
            type="text"
            formControlName="firstName"
            required
            autocomplete="on"
          />
        </mat-form-field>
      </p>

      <p>
        <mat-form-field>
          <mat-label>Mail / N° de téléphone</mat-label>
          <textarea
            matInput
            type="text"
            maxlength="200"
            formControlName="contact"
            required
            autocomplete="on"
          ></textarea>
        </mat-form-field>
      </p>
    </form>

    <button
      mat-flat-button
      color="primary"
      class="create-button"
      (click)="createBetter()"
    >
      Créer le compte
    </button>

    <a class="back" (click)="back()">Revenir</a>
  </div>
</div>
