<div class="create-better-panel">
  <div class="create-better-card">
    <h2>Créer un compte Winabad</h2>

    <form [formGroup]="formGroup" (keydown.enter)="createBetter()">
      <p>
        <mat-form-field hideRequiredMarker="true">
          <mat-label>Nom</mat-label>
          <input
            matInput
            type="text"
            formControlName="name"
            required
            autocomplete="on"
          />
        </mat-form-field>
      </p>

      <p>
        <mat-form-field hideRequiredMarker="true">
          <mat-label>Prénom</mat-label>
          <input
            matInput
            type="text"
            formControlName="firstName"
            required
            autocomplete="on"
          />
        </mat-form-field>
      </p>

      <p>
        <mat-form-field hideRequiredMarker="true">
          <mat-label>Code à 4 chiffres</mat-label>
          <input
            matInput
            [type]="passwordVisibility ? 'text' : 'password'"
            formControlName="password"
            required
            autocomplete="on"
            minlength="4"
            maxlength="4"
            (input)="checkPassword($event)"
          />
          <mat-icon
            matSuffix
            *ngIf="!passwordVisibility"
            (click)="toggleVisibility()"
            >visibility</mat-icon
          >
          <mat-icon
            matSuffix
            *ngIf="passwordVisibility"
            (click)="toggleVisibility()"
            >visibility_off</mat-icon
          >
        </mat-form-field>
      </p>

      <p>
        <mat-form-field hideRequiredMarker="true">
          <mat-label>Mail / N° de téléphone</mat-label>
          <input
            matInput
            type="text"
            maxlength="200"
            formControlName="contact"
            required
            autocomplete="on"
            (focus)="focus()"
          />
        </mat-form-field>
      </p>
    </form>

    <button
      mat-flat-button
      color="primary"
      class="create-button"
      (click)="createBetter()"
    >
      Créer le compte
    </button>

    <a class="back" (click)="back()">Revenir</a>
  </div>
</div>
