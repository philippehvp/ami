<div class="create-better">
  <div class="create-better-panel">
    <h2>Création</h2>

    <form [formGroup]="formGroup">
      <p>
        <mat-form-field>
          <mat-label>Login de connexion</mat-label>
          <input
            matInput
            type="text"
            formControlName="account"
            required
            autocomplete="on"
          />
        </mat-form-field>
      </p>

      <p>
        <mat-form-field>
          <mat-label>Mot de passe</mat-label>
          <input
            matInput
            type="password"
            formControlName="password"
            required
            autocomplete="on"
          />
        </mat-form-field>
      </p>

      <p>
        <mat-form-field>
          <mat-label>Nom</mat-label>
          <input
            matInput
            type="text"
            formControlName="name"
            required
            autocomplete="on"
          />
        </mat-form-field>
      </p>

      <p>
        <mat-form-field>
          <mat-label>Prénom</mat-label>
          <input
            matInput
            type="text"
            formControlName="firstName"
            required
            autocomplete="on"
          />
        </mat-form-field>
      </p>

      <p>
        <mat-form-field>
          <mat-label>Contact</mat-label>
          <input
            matInput
            type="text"
            formControlName="contact"
            required
            autocomplete="on"
          />
          <mat-hint>Comment vous contacter</mat-hint>
        </mat-form-field>
      </p>
    </form>

    <button
      mat-flat-button
      color="primary"
      class="create-button"
      (click)="createBetter()"
    >
      Créer le compte
    </button>

    <a class="back" (click)="back()">Revenir</a>
  </div>
</div>
