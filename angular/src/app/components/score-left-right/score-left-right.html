<div class="score">
  <div class="score-left">
    <div>
      <button matButton="tonal" (click)="addPointLeftPair()">+ 1</button>
    </div>
    <div class="score-value">{{point.pointLeftPair}}</div>
  </div>
  <div class="score-right">
    <div class="score-value">{{point.pointRightPair}}</div>
    <div>
      <button matButton="tonal" (click)="addPointRightPair()">+ 1</button>
    </div>
  </div>
</div>
