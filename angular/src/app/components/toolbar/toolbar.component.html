<ng-container
  class="toolbar"
  *ngIf="{
    better: better$ | async
  } as data"
>
  <div class="toolbar">
    <span class="title-area">
      <span class="isb"></span>
      <span class="title">WINABAD</span>
    </span>

    <span *ngIf="!data.better?.isAdmin"
      >{{ completedBets$ | async }} / {{ (bets$ | async)?.length }}</span
    >
    <span class="material-icons menu" (click)="toggleSideMenu()">menu</span>
  </div>
</ng-container>
