<ng-container
  class="toolbar"
  *ngIf="{
    better: better$ | async,
    completedBets: completedBets$ | async,
    bets: bets$ | async
  } as data"
>
  <div class="toolbar">
    <span class="title-area link" (click)="toggleAbout()">
      <span>
        <svg
          id="logo"
          xmlns="http://www.w3.org/2000/svg"

          viewBox="0 0 159.32 173.43"
          width="29"
          height="32"
        >
          <defs>
            <linearGradient
              id="gradient"
              data-name="gradient"
              x1="48.94"
              y1="89.99"
              x2="88.63"
              y2="89.99"
              gradientUnits="userSpaceOnUse"
            >
              <stop offset="0" stop-color="#fff" stop-opacity="0" />
              <stop offset=".38" stop-color="#71716f" stop-opacity=".63" />
              <stop offset=".7" stop-color="#1d1d1b" />
            </linearGradient>
          </defs>
          <g id="volant">
            <path
              class="logo-color"
              d="M72.2,74.63c-2.75,1.05-5.18,2.1-7.32,3.16-19.96,9.82-14.96,19.58-13.85,21.3,.1,.18,.18,.27,.18,.27-14.92-5.12-25.66-30.02,5.13-43.27,23.61-10.16,34.85-18.61,38.81-21.99,.9-.77,2.29-.45,2.78,.63,7.46,16.7,4.01,28.6-25.72,39.9Z"
            />
            <path
              class="logo-color"
              d="M100.33,94.07c-12.21,9.37-26.16,13.61-32.73,26.23-.56,1.08-2.01,1.32-2.86,.44-3.33-3.48-9.84-11.5-7.34-18.76,.35-1.03,.89-2.04,1.64-3.03,5.44-7.11,19.44-13.77,29.59-19.47,3.62-2.03,6.75-3.94,8.84-5.69,.69-.58,1.69-.58,2.34,.04,3.23,3.07,11.06,12.16,.52,20.24Z"
            />
            <path
              class="logo-gradient"
              d="M88.63,79.48c-10.15,5.69-24.15,12.36-29.59,19.47-.75,.98-.49,2.21-.84,3.24-2.06-.54-6.06-2.08-8.19-3.52-1.11-1.73-5.1-11.06,14.86-20.88,5.37,2.21,13.3,3.85,23.75,1.69Z"
            />
            <path
              class="logo-color"
              d="M96.2,122.76c.32,5.22-3.62,9.71-8.83,10.03-2.15,.13-4.18-.46-5.82-1.57-.25-.15-.71-.58-.95-.77-1.7-1.66-3.89-5.21-.4-7.36,5.11-3.68,4.84-3.66,8.26-7.03,.35-.36,.74-.74,1.17-1.16,.23-.22,.53-.31,.81-.26,.11,.03,.23,.08,.33,.13,.02,0,.04,.02,.04,.02,3.02,1.43,5.17,4.41,5.39,7.97Z"
            />
          </g>
          <g id="ecusson" data-name="ecusson">
            <path
              class="logo-color"
              d="M77.5,173.43l-4.86-2.75C26.97,144.86-.86,96.22,.02,43.76l.03-1.82L80.41,0l78.91,44.62-.03,1.82c-.88,52.46-30.32,100.13-76.84,124.41l-4.95,2.58Zm2.11-8.01l1.42,2.71-1.42-2.71c43.99-22.96,72.03-67.77,73.51-117.27L80.3,6.97,6.12,45.68c-.18,49.53,26.34,95.25,69.53,119.67l1.96,1.11,2-1.04Z"
            />
          </g>
        </svg>
      </span>
      <span class="title">WINABAD</span>
    </span>

    <ng-container *ngIf="!isToolbarLimitedMode">
      <span (click)="showBetsReviewOf(data.better)" class="link"
        >{{ data?.completedBets || 0 }} / {{ (data?.bets || []).length }}
        <mat-progress-bar
          mode="determinate"
          [value]="
            ((data?.completedBets || 0 * 1.0) / (data?.bets || []).length) * 100
          "
        >
        </mat-progress-bar>
      </span>
    </ng-container>

    <span class="material-icons-outlined link" (click)="toggleCompactMode()">{{
      compactModeIcon
    }}</span>

    <span class="material-icons-outlined link" (click)="toggleSideNav()"
      >menu</span
    >
  </div>
</ng-container>
