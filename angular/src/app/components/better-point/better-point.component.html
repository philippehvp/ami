<h2 mat-dialog-title>Points des pronostiqueurs</h2>
<mat-dialog-content style="height: calc(100% - 6em)">
  <table mat-table [dataSource]="(betterPoints$ | async) || []">
    <ng-container matColumnDef="better">
      <th mat-header-cell *matHeaderCellDef>Pronostiqueurs</th>
      <td mat-cell *matCellDef="let better">
        {{ better.name }} - {{ better.firstName }}
      </td>
    </ng-container>

    <ng-container matColumnDef="points">
      <th mat-header-cell *matHeaderCellDef>Points</th>
      <td mat-cell *matCellDef="let better">{{ better.points }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close (click)="cancel()" cdkFocusInitial>
    Fermer
  </button>
</mat-dialog-actions>
