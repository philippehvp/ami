<div
  class="x-moving"
  [style.animationPlayState]="animationPlayState"
  [style.left]="circleLeft"
>
  <div
    class="y-moving"
    [style.animationPlayState]="animationPlayState"
    [style.top]="circleTop"
  >
    <span
      class="circle large shade3"
      [style.animationPlayState]="animationPlayState"
    ></span>
    <span
      class="circle medium shade2"
      [style.animationPlayState]="animationPlayState"
    ></span>
    <span
      class="circle small shade1"
      [style.animationPlayState]="animationPlayState"
    ></span>
  </div>
</div>
