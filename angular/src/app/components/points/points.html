@if(set$ | async; as set) {
<div class="content">
  <div class="points">
    @for(cell of cells; track cell; let index = $index) {
    <span
      class="point"
      [class]="getClass(set.points, $index)"
      (click)="showPoint(set, $index)"
    >
      @if(set.points[$index]) { {{displayScore(set.points[$index])}} }
    </span>

    }
  </div>

  @if(pointToShow) {
  <court-left-right [point]="pointToShow"></court-left-right>
  }
</div>
}
