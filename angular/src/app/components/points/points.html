@if(points$ | async; as points) { @if(set$ | async; as set) {
<div class="content">
  <div class="points">
    @for(cell of cells; track cell; let index = $index) {
    <span
      class="point"
      [class]="getClass(points, $index)"
      (click)="showPoint(set, points, $index)"
    >
      @if(points[$index]) { {{displayScore(points[$index])}} }
    </span>

    }
  </div>

  @if(pointToShow) {
  <court-left-right [point]="pointToShow"></court-left-right>
  }
</div>
} }
