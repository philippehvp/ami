<h2 mat-dialog-title>Paramètres</h2>

<mat-dialog-content style="height: calc(100% - 6em)">
  <span class="setting-row" (click)="toggleWithClubName()">
    <mat-slide-toggle [checked]="withClubName"></mat-slide-toggle>
    <span class="text-area">
      <span class="title">Nom des clubs</span>
      <span class="detail">Affiche le nom des clubs</span>
    </span>
  </span>

  <span class="setting-row" (click)="toggleAutoNavigation()">
    <mat-slide-toggle [checked]="isAutoNavigation"></mat-slide-toggle>
    <span class="text-area">
      <span class="title">Navigation automatique</span>
      <span class="detail">Affiche la série suivante automatiquement</span>
    </span>
  </span>

  <span class="setting-row" (click)="togglePlayerReverse()">
    <mat-slide-toggle [checked]="isPlayerReverse"></mat-slide-toggle>
    <span class="text-area">
      <span class="title">Joueurs à gauche</span>
      <span class="detail">Affiche le nom des joueurs à gauche</span>
    </span>
  </span>

  <span class="setting-row" (click)="toggleDarkMode()">
    <mat-slide-toggle [checked]="isDarkMode"></mat-slide-toggle>
    <span class="text-area">
      <span class="title">Mode sombre</span>
      <span class="detail">Active le mode sombre</span>
    </span>
  </span>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-flat-button color="primary" (click)="close()" cdkFocusInitial>
    Fermer
  </button>
</mat-dialog-actions>
