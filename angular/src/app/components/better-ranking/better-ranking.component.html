<div class="ranking-panel">
  <span>Clique sur le nom d'un joueur pour afficher ses pronostics.</span>

  <table mat-table [dataSource]="(bettersRanking$ | async) || []">
    <ng-container matColumnDef="ranking">
      <th class="ranking" mat-header-cell *matHeaderCellDef>Rang</th>
      <td mat-cell *matCellDef="let ranking">
        {{ ranking.ranking }}
      </td>
    </ng-container>

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>
        <span>Pronostiqueurs</span>
      </th>
      <td
        mat-cell
        *matCellDef="let ranking"
        (click)="showBetsReviewOf(ranking.randomKey)"
      >
        {{ ranking.name }} - {{ ranking.firstName }}
      </td>
    </ng-container>

    <ng-container matColumnDef="points">
      <th mat-header-cell *matHeaderCellDef>
        <span>Points</span>
      </th>
      <td mat-cell *matCellDef="let ranking">
        {{ ranking.points }}
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
