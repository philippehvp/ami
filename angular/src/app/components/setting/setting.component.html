<div class="setting-button-panel" (click)="closeSettingPanel()">
  <span class="setting-open-close">
    <span class="material-icons-outlined"> expand_more </span>
  </span>
</div>

<div class="setting-panel">
  <h4>Paramètres</h4>
  <span class="setting-row">
    <mat-slide-toggle
      [checked]="withClubName"
      (change)="toggleWithClubName()"
    ></mat-slide-toggle>
    <span class="text-area">
      <span class="title">Nom des clubs</span>
      <span class="detail">Affiche le nom des clubs</span>
    </span>
  </span>

  <span class="setting-row">
    <mat-slide-toggle
      [checked]="isAutoNavigation"
      (change)="toggleAutoNavigation()"
    ></mat-slide-toggle>
    <span class="text-area">
      <span class="title">Navigation automatique</span>
      <span class="detail">Affiche la série suivante automatiquement</span>
    </span>
  </span>

  <span class="setting-row">
    <mat-slide-toggle
      [checked]="isPlayerReverse"
      (change)="togglePlayerReverse()"
    ></mat-slide-toggle>
    <span class="text-area">
      <span class="title">Colonnes inversées</span>
      <span class="detail">Affiche les noms des joueurs à gauche</span>
    </span>
  </span>

  <span class="setting-row">
    <mat-slide-toggle
      [checked]="isDarkMode"
      (change)="toggleDarkMode()"
    ></mat-slide-toggle>
    <span class="text-area">
      <span class="title">Mode sombre</span>
      <span class="detail">Active le mode sombre</span>
    </span>
  </span>
</div>
