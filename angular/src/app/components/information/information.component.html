<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content style="height: calc(100% - 6em)">
  <p>{{ data.message }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button
    mat-flat-button
    mat-dialog-close
    color="primary"
    (click)="close()"
    cdkFocusInitial
  >
    Fermer
  </button>
</mat-dialog-actions>
