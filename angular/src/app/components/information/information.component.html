<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content style="height: calc(100% - 6em)">
  <p>{{ data.message }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  @if (isInformationType) {
    <div>
      <button matButton mat-dialog-close>
        {{ firstButtonLabel }}
      </button>
    </div>
  } @else {
    <div>
      <button matButton mat-raised-button mat-dialog-close>
        {{ firstButtonLabel }}
      </button>
      <button matButton mat-raised-button (click)="validate()">
        {{ secondButtonLabel }}
      </button>
    </div>
  }
</mat-dialog-actions>
