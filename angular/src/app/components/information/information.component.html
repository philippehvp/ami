<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content style="height: calc(100% - 6em)">
  <p>{{ data.message }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <div *ngIf="isInformationType; else yesNo">
    <button mat-flat-button color="primary" (click)="close()" cdkFocusInitial>
      {{ firstButtonLabel }}
    </button>
  </div>

  <ng-template #yesNo>
    <button mat-flat-button (click)="cancel()" cdkFocusInitial>
      {{ firstButtonLabel }}
    </button>
    <button mat-flat-button (click)="validate()">
      {{ secondButtonLabel }}
    </button>
  </ng-template>
</mat-dialog-actions>
