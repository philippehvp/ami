<h2 mat-dialog-title>Gestion des données</h2>
<mat-dialog-content style="height: calc(100% - 6em)">
  <p>Texte à compléter pour le RGPD.</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <div>
    <mat-checkbox [(ngModel)]="isCloseButtonDisabled"
      >Accepter les conditions</mat-checkbox
    >
    <br />
    <button
      mat-flat-button
      color="primary"
      (click)="close()"
      [disabled]="!isCloseButtonDisabled"
    >
      Accepter
    </button>
  </div>
</mat-dialog-actions>
