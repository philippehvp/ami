<div class="court">
  <div>
    <table class="court-left-right">
      <tbody>
        <tr>
          <td [class]="getClassLeftRight('nw', point, 1)">
            {{getPlayerName(point, 1)}}
          </td>
          <td class="cl">&nbsp;</td>
          <td class="cr">&nbsp;</td>
          <td [class]="getClassLeftRight('ne', point, 3)">
            {{getPlayerName(point, 3)}}
          </td>
        </tr>
        <tr>
          <td [class]="getClassLeftRight('sw', point, 2)">
            {{getPlayerName(point, 2)}}
          </td>
          <td class="cl" data-server="cl">&nbsp;</td>
          <td class="cr" data-server="cr">&nbsp;</td>
          <td [class]="getClassLeftRight('se', point, 4)">
            {{getPlayerName(point, 4)}}
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div>
    <table class="court-up-down">
      <tbody>
        <tr>
          <td [class]="getClassUpDown('nw', point, 2)">
            {{getPlayerName(point, 2)}}
          </td>
          <td [class]="getClassUpDown('ne', point, 1)">
            {{getPlayerName(point, 1)}}
          </td>
        </tr>

        <tr>
          <td class="ul">&nbsp;</td>
          <td class="ur">&nbsp;</td>
        </tr>

        <tr>
          <td class="dl">&nbsp;</td>
          <td class="dr">&nbsp;</td>
        </tr>

        <tr>
          <td [class]="getClassUpDown('sw', point, 4)">
            {{getPlayerName(point, 4)}}
          </td>
          <td [class]="getClassUpDown('se', point, 3)">
            {{getPlayerName(point, 3)}}
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
