@if(isMatchLaunched) {@if(justPlayedPoint$ | async; as justPlayedPoint) {

<div class="live">
  <div class="score">
    <score-left-right [point]="justPlayedPoint"></score-left-right>
  </div>

  <div class="server-receiver">
    <server-receiver [point]="justPlayedPoint"></server-receiver>
  </div>
  <div class="court">
    <court [point]="justPlayedPoint"></court>
  </div>
</div>

}}
