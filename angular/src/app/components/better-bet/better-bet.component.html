<table mat-table [dataSource]="bets || []">
  <!-- <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Pronostiqueurs</th>
    <td mat-cell *matCellDef="let element">{{ i }}</td>
  </ng-container> -->
  <ng-container
    [matColumnDef]="column"
    *ngFor="let column of displayedColumns; let i = index"
  >
    <th mat-header-cell *matHeaderCellDef>{{ getColumnLabel(i, column) }}</th>

    <span *ngIf="isNameColumn(i)">
      <td mat-cell *matCellDef="let bet">
        {{ getBetterName(bet) }}
      </td>
    </span>

    <span *ngIf="isBetColumn(i)">
      <td mat-cell *matCellDef="let bet">
        {{ getBetDetail(i, bet, true, true) }}{{ breakSymbol()
        }}{{ getBetDetail(i, bet, true, false) }}
        <br />
        {{ getBetDetail(i, bet, false, true) }}{{ breakSymbol()
        }}{{ getBetDetail(i, bet, false, false) }}
      </td>
    </span>

    <span *ngIf="isPointsColumn(i)">
      <td mat-cell *matCellDef="let bet">&nbsp;</td>
    </span>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
