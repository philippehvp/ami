  <table class="better-bet">
    <thead>
      <tr>
        <th>NOM PRENOM</th>
        <th>V/F</th>
        <th
          *ngFor="let column of manualDisplayedColumns; let i = index"
          [attr.colspan]="getColSpanForTwo(i)"
          [style.display]="getColSpanForTwo(i) ? '' : 'none'"
        >
          {{ column }}
        </th>
        <th>Match le + long</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let bet of displayedBetterBet.rows; let i = index">
        <td
          [attr.rowspan]="getRowSpanForBetterName(i)"
          [style.display]="getRowSpanForBetterName(i) ? '' : 'none'"
        >
          {{ getName(i) }}
        </td>

        <td>
          {{ getWinnerOrRunnerUp(i) }}
        </td>

        <td
          *ngFor="let column of manualDisplayedColumns; let j = index"
          [style.fontWeight]="isWinner(i) ? 'bold' : ''"
        >
          {{ getPlayerName(i, j) }}
        </td>
        <td
          [attr.rowspan]="getRowSpanForDuration(i)"
          [style.display]="getRowSpanForDuration(i) ? '' : 'none'"
        >
          {{ bet.duration }}
        </td>
        <td
          [attr.rowspan]="getRowSpanForTotal(i)"
          [style.display]="getRowSpanForTotal(i) ? '' : 'none'"
        >
          &nbsp;
        </td>
      </tr>
    </tbody>
  </table>
