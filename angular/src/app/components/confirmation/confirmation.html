<mat-nav-list>
  <a mat-list-item (click)="cancel()">
    <span matListItemTitle>Non</span>
    <span matLine>Ne pas revenir à ce point</span>
  </a>

  <a mat-list-item (click)="validate()">
    <span matListItemTitle>Oui</span>
    <span matLine>Revenir à ce point et supprimer les points suivants</span>
  </a>
</mat-nav-list>
