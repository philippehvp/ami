<div class="page">
  <div class="selection">
    <selection></selection>
  </div>
  <div class="content">
    @if (isMatchLaunched) {
      <div class="view">
        <mat-tab-group>
          <mat-tab label="Live">
            <live></live>
          </mat-tab>
          <mat-tab label="Premier set">
            <points [set$]="firstSet$" />
          </mat-tab>
          @if (secondSet$ | async; as secondSet) {
            <mat-tab label="Deuxième set">
              <points [set$]="secondSet$" />
            </mat-tab>
          } @else {
            <mat-tab label="Deuxième set" disabled> </mat-tab>
          }
          @if (thirdSet$ | async; as thirdSet) {
            <mat-tab label="Troisième set">
              <points [set$]="thirdSet$" />
            </mat-tab>
          } @else {
            <mat-tab label="Troisième set" disabled> </mat-tab>
          }
        </mat-tab-group>
      </div>
    }
  </div>
</div>
