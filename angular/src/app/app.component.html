<ng-container
  class="toolbar"
  *ngIf="{
    bets: bets$ | async,
    completedBets: completedBets$ | async,
    better: better$ | async
  } as data"
>
  <mat-sidenav-container>
    <mat-sidenav-content class="content">
      <!-- Toolbar -->
      <div class="row no-growing" *ngIf="data.better && isToolbarVisible">
        <mat-toolbar>
          <toolbar></toolbar>
        </mat-toolbar>
      </div>
      <router-outlet></router-outlet>
    </mat-sidenav-content>

    <mat-sidenav #aboutnav mode="over" position="start">
      <div class="nav-panel" (click)="toggleAboutNav()">
        <span class="material-icons-outlined close"> close </span>
        <span class="about">
          <h3>Winabad</h3>
          <p>
            Le club d'Istres Sports Badminton est heureux de présenter le jeu
            Winabad en collaboration avec Phocea Light, spécialiste du matériel
            et de l'éclairage événementiel.
          </p>
        </span>
        <span class="logo-panel">
          <span class="logo-row" *ngFor="let logoRow of logos">
            <span *ngFor="let logo of logoRow">
              <span class="logo">
                <img
                  [src]="getLogoFile(data.better || null, logo)"
                  alt=""
                  class="icon"
                />
                {{ logo.label }}
              </span>
            </span>
          </span>
        </span>
      </div>
    </mat-sidenav>

    <mat-sidenav #sidenav mode="over" position="end">
      <mat-nav-list (click)="toggleSideMenu()" class="nav">
        <span class="material-icons-outlined close"> close </span>

        <span *ngIf="data.better?.isAdmin; else normal">
          <span class="link" (click)="displayBettersBet()">Pronostics</span>
          <span class="link" (click)="displayBettersRanking()">Classement</span>
          <span class="link" (click)="displayBettersOrderedByName()"
            >Récapitulatif</span
          >
        </span>

        <ng-template #normal>
          <span class="link" (click)="navigate('rule')"
            ><span class="material-icons-outlined icon"> menu_book </span
            ><span class="label">Barème</span></span
          >
          <span class="link" (click)="displayTutorial()">
            <span class="material-icons-outlined icon"> info </span>
            <span class="label">Tutoriel</span>
          </span>
        </ng-template>

        <span class="link logout" (click)="logout(0, 0, true)"
          ><span class="material-icons-outlined icon"> logout </span
          ><span class="label"> Se déconnecter </span></span
        >
      </mat-nav-list>
    </mat-sidenav>
  </mat-sidenav-container>
</ng-container>
