services:
  db:
    container_name: ami-db
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ami
      MYSQL_ROOT_PASSWORD: Allezlom2014
      # MYSQL_USER: root
      MYSQL_PASSWORD: Allezlom2014
      TZ: Europe/Paris
    ports:
      - "3306:3306"
    volumes:
      - db-volume:/var/lib/mysql/
    tty: true

  phpmyadmin:
    container_name: ami-phpmyadmin
    image: phpmyadmin:latest
    ports:
      - "8000:80"
    links:
      - db:db
    depends_on:
      - db
    environment:
      MYSQL_USER: root
      MYSQL_PASSWORD: Allezlom2014
      MYSQL_ROOT_PASSWORD: Allezlom2014
      UPLOAD_LIMIT: 72000000
    hostname: ami-phpmyadmin

  php:
    container_name: ami-php-backend
    build: ./php_rest
    # command: /usr/sbin/apache2ctl -D FOREGROUND
    ports:
      - "8080:80"
    volumes:
      - ./php_rest:/var/www/html/

  angular:
    container_name: ami-angular
    build: ./angular
    command: ng serve --host 0.0.0.0
    ports:
      - "4200:4200"
    volumes:
      - ./angular:/src

volumes:
  db-volume:
    driver: local
